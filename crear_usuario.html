<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Usuario</title>
</head>

<body>

  <h1>👤 Crear Usuario</h1>

  <a href="index.html">⬅ Volver</a>

  <br><br>

  <button onclick="logout()">Cerrar sesión</button>

  <br><br>

  <!-- 🧩 CREAR -->
  <form id="form">
    <input type="text" id="username" placeholder="Usuario" required>
    <br><br>

    <input type="password" id="password" placeholder="Contraseña" required>
    <br><br>

    <select id="role">
      <option value="seller">Vendedor</option>
      <option value="admin">Admin</option>
    </select>

    <br><br>

    <button type="submit">Crear</button>
  </form>

  <p id="msg"></p>

  <hr>

  <!-- 📋 LISTA -->
  <h2>👥 Usuarios</h2>
  <div id="lista"></div>

  <script>
    const API_URL = "https://ticketsapp-production-0823.up.railway.app";

    const form = document.getElementById("form");
    const msg = document.getElementById("msg");
    const lista = document.getElementById("lista");

    const token = localStorage.getItem("token");

    // 🔐 bloquear si no está logueado
    if (!token) {
      alert("No autorizado");
      window.location.href = "index.html";
    }

    function logout() {
      localStorage.removeItem("token");
      window.location.href = "index.html";
    }

    // ➕ CREAR USUARIO
    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const user = {
        username: document.getElementById("username").value,
        password: document.getElementById("password").value,
        role: document.getElementById("role").value
      };

      try {
        const res = await fetch(`${API_URL}/users`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": token
          },
          body: JSON.stringify(user)
        });

        if (res.ok) {
          msg.innerText = "Usuario creado 🚀";
          form.reset();
          cargarUsuarios(); // 🔥 refresca lista
        } else {
          msg.innerText = "Error ❌ (¿sos admin?)";
        }

      } catch (err) {
        console.error(err);
        msg.innerText = "Error conexión";
      }
    });

    // 📥 CARGAR USUARIOS
    async function cargarUsuarios() {
      try {
        const res = await fetch(`${API_URL}/users`, {
          headers: { "Authorization": token }
        });

        const data = await res.json();

        lista.innerHTML = "";

        data.forEach(user => {
          const div = document.createElement("div");

          div.innerHTML = `
            <b>${user.username}</b> (${user.role})
            <button onclick="eliminar(${user.id})">Eliminar</button>
            <hr>
          `;

          lista.appendChild(div);
        });

      } catch (err) {
        console.error(err);
      }
    }

    // ❌ ELIMINAR
    async function eliminar(id) {
      if (!confirm("¿Eliminar usuario?")) return;

      await fetch(`${API_URL}/users/${id}`, {
        method: "DELETE",
        headers: { "Authorization": token }
      });

      cargarUsuarios();
    }

    // 🚀 INIT
    cargarUsuarios();
  </script>

</body>
</html>
