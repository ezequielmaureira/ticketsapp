<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Evento</title>
</head>
<body>

<h1>Crear Evento</h1>

<a href="index.html">⬅ Volver</a>

<form id="form">
  <input type="text" id="name" placeholder="Nombre del evento" required>
  <br><br>

  <input type="date" id="date" required>
  <br><br>

  <input type="number" id="price" placeholder="Precio" required>
  <br><br>

  <button type="submit">Guardar evento</button>
</form>

<p id="msg"></p>

<script>
  const form = document.getElementById("form");
  const msg = document.getElementById("msg");

  const API_URL = "https://ticketsapp-production-0823.up.railway.app";

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const evento = {
      name: document.getElementById("name").value,
      date: document.getElementById("date").value,
      price: Number(document.getElementById("price").value)
    };

    console.log("📦 Enviando evento:", evento);

    try {
      const res = await fetch(`${API_URL}/events`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(evento)
      });

      console.log("STATUS:", res.status);

      const data = await res.text();
      console.log("RESPUESTA:", data);

      if (res.ok) {
        msg.innerText = "Evento enviado 🚀";
        form.reset();
      } else {
        msg.innerText = "Error en backend";
      }

    } catch (error) {
      console.error("❌ ERROR FETCH:", error);
      msg.innerText = "Error de conexión con backend";
    }
  });
</script>

</body>
</html>
