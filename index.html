<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eventos</title>
</head>

<body>

  <h1>🎟️ Eventos</h1>

  <!-- 🔐 LOGIN -->
  <div id="loginBox">
    <h3>Login</h3>
    <input type="text" id="user" placeholder="Usuario">
    <input type="password" id="pass" placeholder="Contraseña">
    <button onclick="login()">Ingresar</button>
    <p id="loginMsg"></p>
  </div>

  <br>

  <!-- 🧑‍💼 PANEL (APARECE SI ESTÁ LOGUEADO) -->
  <div id="panelAdmin" style="display:none;">
    <a href="crear_evento.html">➕ Crear evento</a>
    <a href="crear_usuario.html">👤 Crear usuario</a>
    <br><br>
    <button onclick="logout()">Cerrar sesión</button>
  </div>

  <br>

  <!-- 📦 EVENTOS -->
  <div id="contenedor"></div>

  <script src="js/render.js?v=3"></script>

  <script>
    const API_URL = "https://ticketsapp-production-0823.up.railway.app";

    const contenedor = document.getElementById("contenedor");

    // 🔐 LOGIN
    async function login() {
      const user = document.getElementById("user").value;
      const pass = document.getElementById("pass").value;

      try {
        const res = await fetch(`${API_URL}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ user, pass })
        });

        const data = await res.json();

        if (data.token) {
          localStorage.setItem("token", data.token);
          document.getElementById("loginMsg").innerText = "Logueado ✅";
          checkLogin();
        } else {
          document.getElementById("loginMsg").innerText = "Error login ❌";
        }

      } catch (err) {
        console.error(err);
        document.getElementById("loginMsg").innerText = "Error conexión";
      }
    }

    // 🔓 LOGOUT
    function logout() {
      localStorage.removeItem("token");
      location.reload();
    }

    // 🔍 VERIFICAR LOGIN
    function checkLogin() {
      const token = localStorage.getItem("token");

      if (token) {
        document.getElementById("panelAdmin").style.display = "block";
        document.getElementById("loginBox").style.display = "none";
      }
    }

    // 📥 CARGAR EVENTOS
    async function cargarEventos() {
      try {
        const res = await fetch(`${API_URL}/events`);
        return await res.json();
      } catch (err) {
        console.error("Error cargando eventos:", err);
        return [];
      }
    }

    async function render() {
      const eventos = await cargarEventos();

      contenedor.innerHTML = "";

      if (eventos.length === 0) {
        contenedor.innerHTML = "<p>No hay eventos todavía</p>";
        return;
      }

      for (let evento of eventos) {
        const card = await crearCard(evento);
        contenedor.appendChild(card);
      }
    }

    // 🚀 INIT
    checkLogin();
    render();
  </script>

</body>
</html>
