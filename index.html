<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eventos</title>
</head>

<body>

  <h1>🎟️ Eventos</h1>

  <!-- 🔐 LOGIN -->
  <div id="loginBox">
    <h3>Login</h3>
    <input type="text" id="user" placeholder="Usuario">
    <input type="password" id="pass" placeholder="Contraseña">
    <button onclick="login()">Ingresar</button>
    <p id="loginMsg"></p>
  </div>

  <!-- 👋 BIENVENIDA -->
  <h3 id="welcome"></h3>

  <!-- 🧑‍💼 PANEL -->
  <div id="panelAdmin" style="display:none;">
    <a href="crear_evento.html">➕ Crear evento</a>
    <a href="crear_usuario.html" id="btnUsuarios">👤 Crear usuario</a>
    <br><br>
    <button onclick="logout()">Cerrar sesión</button>
  </div>

  <br>

  <div id="contenedor"></div>

  <script src="js/render.js?v=3"></script>

  <script>
    const API_URL = "https://ticketsapp-production-0823.up.railway.app";

    const contenedor = document.getElementById("contenedor");

    // 🧠 DECODIFICAR TOKEN (SIN LIBRERÍA)
    function parseJwt(token) {
      try {
        return JSON.parse(atob(token.split('.')[1]));
      } catch {
        return null;
      }
    }

    // 🔐 LOGIN
    async function login() {
      const user = document.getElementById("user").value;
      const pass = document.getElementById("pass").value;

      try {
        const res = await fetch(`${API_URL}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ user, pass })
        });

        const data = await res.json();

        if (data.token) {
          localStorage.setItem("token", data.token);
          checkLogin();
        } else {
          document.getElementById("loginMsg").innerText = "Error login ❌";
        }

      } catch (err) {
        console.error(err);
      }
    }

    // 🔓 LOGOUT
    function logout() {
      localStorage.removeItem("token");
      location.reload();
    }

    // 🔍 CHECK LOGIN + ROLE
    function checkLogin() {
      const token = localStorage.getItem("token");

      if (!token) return;

      const user = parseJwt(token);

      if (!user) return;

      // 👋 mostrar usuario
      document.getElementById("welcome").innerText =
        `Bienvenido 👋 (ID: ${user.id} - ${user.role})`;

      document.getElementById("loginBox").style.display = "none";
      document.getElementById("panelAdmin").style.display = "block";

      // 🚫 solo admin ve usuarios
      if (user.role !== "admin") {
        document.getElementById("btnUsuarios").style.display = "none";
      }
    }

    // 📦 EVENTOS
    async function cargarEventos() {
      try {
        const res = await fetch(`${API_URL}/events`);
        return await res.json();
      } catch {
        return [];
      }
    }

    async function render() {
      const eventos = await cargarEventos();

      contenedor.innerHTML = "";

      if (eventos.length === 0) {
        contenedor.innerHTML = "<p>No hay eventos todavía</p>";
        return;
      }

      for (let evento of eventos) {
        const card = await crearCard(evento);
        contenedor.appendChild(card);
      }
    }

    // 🚀 INIT
    checkLogin();
    render();
  </script>

</body>
</html>
