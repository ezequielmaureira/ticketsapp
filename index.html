<!DOCTYPE html>
<html lang="es">
<h2>Eventos</h2>
<div id="list"></div>

<script>
const events = JSON.parse(localStorage.getItem("events")) || [];

const container = document.getElementById("list");

events.forEach(ev => {
  const div = document.createElement("div");
  div.innerHTML = `
    <h3>${ev.name}</h3>
    <p>📅 ${ev.date}</p>
    <p>💰 $${ev.price}</p>
    <hr>
  `;
  container.appendChild(div);
});
</script>

</body>
</html>
